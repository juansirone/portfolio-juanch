<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0f1e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1533;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00e5ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00b8d4;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" rx="20" fill="url(#bgGrad)"/>

  <!-- Circuit board lines - decorative -->
  <!-- Top-left circuit -->
  <line x1="20" y1="40" x2="50" y2="40" stroke="#00e5ff" stroke-width="1" opacity="0.3"/>
  <line x1="50" y1="40" x2="50" y2="25" stroke="#00e5ff" stroke-width="1" opacity="0.3"/>
  <line x1="50" y1="25" x2="70" y2="25" stroke="#00e5ff" stroke-width="1" opacity="0.3"/>
  <circle cx="50" cy="40" r="2" fill="#00e5ff" opacity="0.5"/>
  <circle cx="70" cy="25" r="2.5" fill="#00e5ff" opacity="0.6"/>

  <!-- Top-right circuit -->
  <line x1="180" y1="40" x2="150" y2="40" stroke="#00e5ff" stroke-width="1" opacity="0.3"/>
  <line x1="150" y1="40" x2="150" y2="25" stroke="#00e5ff" stroke-width="1" opacity="0.3"/>
  <line x1="150" y1="25" x2="130" y2="25" stroke="#00e5ff" stroke-width="1" opacity="0.3"/>
  <circle cx="150" cy="40" r="2" fill="#00e5ff" opacity="0.5"/>
  <circle cx="130" cy="25" r="2.5" fill="#00e5ff" opacity="0.6"/>

  <!-- Bottom-left circuit -->
  <line x1="20" y1="160" x2="45" y2="160" stroke="#00e5ff" stroke-width="1" opacity="0.3"/>
  <line x1="45" y1="160" x2="45" y2="175" stroke="#00e5ff" stroke-width="1" opacity="0.3"/>
  <line x1="45" y1="175" x2="65" y2="175" stroke="#00e5ff" stroke-width="1" opacity="0.3"/>
  <circle cx="45" cy="160" r="2" fill="#00e5ff" opacity="0.5"/>
  <circle cx="65" cy="175" r="2.5" fill="#00e5ff" opacity="0.6"/>

  <!-- Bottom-right circuit -->
  <line x1="180" y1="160" x2="155" y2="160" stroke="#00e5ff" stroke-width="1" opacity="0.3"/>
  <line x1="155" y1="160" x2="155" y2="175" stroke="#00e5ff" stroke-width="1" opacity="0.3"/>
  <line x1="155" y1="175" x2="135" y2="175" stroke="#00e5ff" stroke-width="1" opacity="0.3"/>
  <circle cx="155" cy="160" r="2" fill="#00e5ff" opacity="0.5"/>
  <circle cx="135" cy="175" r="2.5" fill="#00e5ff" opacity="0.6"/>

  <!-- Brackets < > -->
  <text x="18" y="115" font-family="'Courier New', monospace" font-size="22" fill="#00e5ff" opacity="0.5" font-weight="bold">&lt;</text>
  <text x="168" y="115" font-family="'Courier New', monospace" font-size="22" fill="#00e5ff" opacity="0.5" font-weight="bold">&gt;</text>

  <!-- Monogram JC -->
  <text x="100" y="125"
    font-family="'Arial', 'Helvetica Neue', sans-serif"
    font-size="72"
    font-weight="900"
    text-anchor="middle"
    fill="url(#cyanGrad)"
    filter="url(#glow)"
    letter-spacing="-4">JC</text>

  <!-- Thin underline accent -->
  <line x1="60" y1="138" x2="140" y2="138" stroke="#00e5ff" stroke-width="1.5" opacity="0.6"/>

  <!-- Dot nodes on underline -->
  <circle cx="60" cy="138" r="2.5" fill="#00e5ff" opacity="0.8"/>
  <circle cx="140" cy="138" r="2.5" fill="#00e5ff" opacity="0.8"/>
  <circle cx="100" cy="138" r="2" fill="#ffffff" opacity="0.5"/>
</svg>
